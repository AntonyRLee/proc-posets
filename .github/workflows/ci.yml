name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      # Full suite across every layer (numpy + networkx + pm4py + matplotlib).
      - run: uv sync --all-extras
      - run: uv run pytest -q

  numpy-free:
    name: numpy-free import contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.10"
      # Base install only (no extras, no dev group => no numpy).
      - run: uv sync --no-dev
      # `import procposets` must succeed with numpy genuinely absent -- the
      # PEP 562 lazy layer must not pull it eagerly (guards test_lazy_numpy in a
      # real clean environment, not just a mocked one).
      # NB: a bare `uv run` re-syncs the default `dev` group (which pulls numpy),
      # undoing `--no-dev` above; repeat `--no-dev` here to keep the env base-only.
      - run: |
          uv run --no-dev python -c "
          import importlib.util, procposets
          assert importlib.util.find_spec('numpy') is None, 'base install must be numpy-free'
          print('procposets', procposets.__version__, 'imports numpy-free OK')
          "

  lint:
    name: lint + types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-extras
      - run: uv run ruff check .
      # mypy backs the py.typed marker; the just-extracted code is not yet fully
      # strict-clean, so it is advisory (non-blocking) until it is -- see CONTRIBUTING.
      - run: uv run mypy procposets
        continue-on-error: true
